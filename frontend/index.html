<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xuni | 供应链智能调度平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    #root { width: 100%; min-height: 100vh; }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .loading-screen h1 { font-size: 2.5rem; margin-bottom: 0.5rem; font-weight: 700; }
    .loading-screen p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 2rem; }
    .loading-dots { display: flex; gap: 8px; }
    .loading-dots span {
      width: 12px; height: 12px; border-radius: 50%;
      background: white; animation: bounce 1.4s ease infinite both;
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .chat-messages-container {
      scrollbar-width: thin;
      scrollbar-color: #c4b5fd #f1f5f9;
    }
    .chat-messages-container::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages-container::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 3px;
    }
    .chat-messages-container::-webkit-scrollbar-thumb {
      background: #c4b5fd;
      border-radius: 3px;
    }
    .chat-messages-container::-webkit-scrollbar-thumb:hover {
      background: #a78bfa;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <h1>🚀 Xuni Scheduling Platform</h1>
      <p>供应链智能调度平台加载中...</p>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
